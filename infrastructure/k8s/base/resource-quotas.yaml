# =============================================================================
# Resource Quotas & Limit Ranges for the Lakehouse Namespace
# =============================================================================
# Prevents any single workload from consuming all cluster resources.
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: lakehouse-quota
  namespace: lakehouse
spec:
  hard:
    requests.cpu: "40"
    requests.memory: "160Gi"
    limits.cpu: "80"
    limits.memory: "320Gi"
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: lakehouse-limits
  namespace: lakehouse
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: "2Gi"
      defaultRequest:
        cpu: "250m"
        memory: "512Mi"
      max:
        cpu: "16"
        memory: "64Gi"
    - type: Pod
      max:
        cpu: "32"
        memory: "128Gi"
