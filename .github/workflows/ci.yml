# =============================================================================
# NYC Taxi Data Lakehouse — CI Pipeline
# =============================================================================
# Runs on every push and pull request to main.
# Unit tests run on all events; integration tests run only on main merges.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ bronze/ silver/ gold/jobs/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --statistics \
            --count

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Java 11 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest -m "unit" \
            --cov=src --cov=bronze --cov=silver --cov=gold \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-branch \
            --tb=short \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Integration tests (main branch only)
  # ---------------------------------------------------------------------------
  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Java 11 (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start infrastructure
        run: docker compose up -d minio hive-metastore

      - name: Wait for services
        run: |
          echo "Waiting for MinIO and Hive Metastore..."
          sleep 30

      - name: Run integration tests
        run: |
          pytest -m "integration" \
            --tb=short \
            -v \
            --timeout=600

      - name: Tear down infrastructure
        if: always()
        run: docker compose down -v
